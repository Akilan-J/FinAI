version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: finai_postgres
    restart: always
    environment:
      POSTGRES_USER: finai_user
      POSTGRES_PASSWORD: finai_password
      POSTGRES_DB: finai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: finai_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
